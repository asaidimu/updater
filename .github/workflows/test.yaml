name: Test Workflow

on:
  push:
    branches-ignore:
      - ci
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Run tests
        run: go test ./... -v -count=1
